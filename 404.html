<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found — Doubles</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Hanken+Grotesk:wght@400;600&display=swap" rel="stylesheet" />

<style>
:root {
  --teal: #1B5A6B;
  --navy: #1A3A42;
  --cream: #F5F1E8;
  --coral: #FF6B6B;
  --ink: #14272D;
  --serif: 'Cormorant Garamond', serif;
  --sans: 'Hanken Grotesk', sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  color: var(--ink);
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.error-container {
  text-align: center;
  max-width: 600px;
}

.error-code {
  font-family: var(--serif);
  font-size: 120px;
  font-weight: 700;
  color: var(--teal);
  margin: 0;
  line-height: 1;
}

.error-title {
  font-family: var(--serif);
  font-size: 32px;
  color: var(--ink);
  margin: 16px 0 8px;
}

.error-message {
  font-size: 16px;
  color: var(--ink);
  opacity: 0.7;
  margin: 0 0 32px;
}

.btn {
  display: inline-block;
  padding: 14px 32px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  transition: all .2s;
  border: none;
  cursor: pointer;
}

.btn-coral {
  background: var(--coral);
  color: white;
}
.btn-coral:hover {
  background: #E85555;
  transform: translateY(-2px);
}

.btn-dark {
  background: var(--navy);
  color: var(--cream);
  margin-left: 12px;
}
.btn-dark:hover {
  background: var(--ink);
  transform: translateY(-2px);
}

@media (max-width: 600px) {
  .error-code { font-size: 80px; }
  .error-title { font-size: 24px; }
  .btn { display: block; margin: 12px 0; }
  .btn-dark { margin-left: 0; }
}
</style>
</head>
<body>

<div class="error-container">
  <h1 class="error-code">404</h1>
  <h2 class="error-title">Court Not Found</h2>
  <p class="error-message">The page you're looking for doesn't exist. Let's get you back in the game.</p>
  <a href="/" class="btn btn-coral">Back to Home</a>
  <a href="/events" class="btn btn-dark">View Events</a>
</div>

</body>
</html>
