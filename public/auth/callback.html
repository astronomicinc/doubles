<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9f7f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1a3a42;
    }

    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top: 3px solid #1B5A6B;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: #ffe5e5;
      color: #8b0000;
      padding: 16px;
      border-radius: 4px;
      margin-bottom: 16px;
      display: none;
    }

    .error.show {
      display: block;
    }

    a {
      color: #1B5A6B;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Signing in...</h1>
    <div class="spinner"></div>
    <p>Please wait while we verify your sign-in link.</p>
    <div id="error" class="error"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://cjxxqdsbtckurqwkkjem.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqeHhxZHNidGNrdXJxd2tramVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NjYwNjUsImV4cCI6MjA5NTI0MjA2NX0.JMBfEBfOf2p3xPdf2YDB1lmvbfkuqTjZOSNnwbAc0Lo';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleCallback() {
      try {
        // Get the session from the URL hash
        const { data: { session }, error } = await supabase.auth.getSession();

        if (error) throw error;

        if (session) {
          // Successfully authenticated, redirect to dashboard
          window.location.href = '/status';
        } else {
          // No session found
          showError('Sign-in link expired or invalid. Please try again.');
          setTimeout(() => {
            window.location.href = '/auth/signin';
          }, 3000);
        }
      } catch (error) {
        console.error('Callback error:', error);
        showError(error.message || 'An error occurred during sign-in.');
        setTimeout(() => {
          window.location.href = '/auth/signin';
        }, 3000);
      }
    }

    function showError(message) {
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }

    // Handle the callback when page loads
    handleCallback();
  </script>
</body>
</html>
