<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In to Doubles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/doubles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9f7f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .signin-container {
      max-width: 400px;
      width: 90%;
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 32px;
      color: #1a3a42;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #1a3a42;
    }

    input[type="email"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus {
      outline: none;
      border-color: #1B5A6B;
    }

    input[type="email"]:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px 16px;
      background: #1B5A6B;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }

    button[type="submit"]:hover:not(:disabled) {
      opacity: 0.9;
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #d4f748;
      color: #1a3a42;
      border: 1px solid #c4e738;
    }

    .message.error {
      background: #ffe5e5;
      color: #8b0000;
      border: 1px solid #ffcccc;
    }

    .help-text {
      margin-top: 24px;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="signin-container">
    <h1>Sign In to Doubles</h1>

    <form id="signinForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          placeholder="your@email.com"
          required
          autocomplete="email"
        />
      </div>

      <button type="submit" id="submitBtn">Send Sign-In Link</button>
    </form>

    <div id="message" class="message"></div>

    <p class="help-text">A sign-in link will be sent to your email. It expires in 24 hours.</p>
  </div>

  <script>
    const form = document.getElementById('signinForm');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();

      if (!email) {
        showMessage('Please enter your email', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      messageDiv.classList.remove('show', 'success', 'error');

      try {
        const response = await fetch('/api/auth/signin', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email }),
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(data.error || 'Failed to send sign-in link', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send Sign-In Link';
          return;
        }

        showMessage(data.message || 'Sign-in link sent! Check your email.', 'success');
        emailInput.value = '';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Sign-In Link';
      } catch (error) {
        console.error('Error:', error);
        showMessage('An error occurred. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Sign-In Link';
      }
    });

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message show ${type}`;
    }
  </script>
</body>
</html>
