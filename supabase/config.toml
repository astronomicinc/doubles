# Supabase Configuration
# Reference: https://supabase.com/docs/guides/cli/managing-config

[api]
enabled = true
max_body_size = 20
default_query_only_limit = 1000

[db]
major_version = 15

[realtime]
enabled = true
max_bytes_per_second = 1000000
max_connections = 10000
max_joins_per_second = 100
max_messages_per_second = 100
max_presence_changes_per_second = 100
max_presence_joins_per_second = 100

[auth]
enable_signup = true
enable_anonymous_signups = false
jwt_expiry = 3600
external_url_requires_https = true

[auth.email]
enable_confirmations = false
secure_email_change_confirmation = true
max_enrolled_factors = 10

[auth.sms]
enable_signup = true
enable_confirmations = true
max_enrolled_factors = 10

[storage]
file_size_limit = 52428800

[storage.s3]
enabled = false
